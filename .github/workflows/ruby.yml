name: Build

#プルリクエスト作成時に実行(他にもpush時など設定できます)
on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: rails8-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  rspec-job:
    #ubuntu環境で動かします
    runs-on: ubuntu-latest
    # OpenSearch イメージ(約1.9GB)の pull + build がクリティカルパスに乗るため 7 -> 10 に緩和
    timeout-minutes: 10
    env:
      RAILS_ENV: test
      OPENSEARCH_URL: http://127.0.0.1:9200

    services:
      mysql:
        image: mysql:9.7
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
      # OpenSearch は services: ではなく steps: 内で docker run する。
      # searchkick language: 'japanese' が analysis-kuromoji を要求するため、
      # ローカル開発と同じ devenv/opensearch/Dockerfile をビルドして使う。

    # https://github.com/ruby/setup-ruby
    steps:
      - uses: Kesin11/actions-timeline@v3
        with:
          # github-token: ${{ secrets.GITHUB_TOKEN }}
          show-waiting-runner: true
      - name: checkout
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/checkout@v6
      - name: checkout pr
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Ruby version
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .tool-versions
          bundler-cache: true
      - name: Use Node.js 22.19.0
        uses: actions/setup-node@v7
        with:
          node-version: 24.15.0
          package-manager-cache: false
      # OpenSearch起動用に必要
      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144
      - name: Run OpenSearch
        run: |
          docker build -t rails8-opensearch -f devenv/opensearch/Dockerfile .
          docker run -d --name opensearch -p 9200:9200 \
            -e discovery.type=single-node \
            -e DISABLE_SECURITY_PLUGIN=true \
            -e DISABLE_INSTALL_DEMO_CONFIG=true \
            -e OPENSEARCH_JAVA_OPTS='-Xms512m -Xmx512m' \
            --ulimit memlock=-1:-1 \
            rails8-opensearch
      #MySQLをインストール
      - name: Install dependent libralies
        run: sudo apt-get update -y && sudo apt-get install libmysqlclient-dev
      - name: Verify OpenSearch connection from host
        run: |
          echo "${OPENSEARCH_URL}"
          for i in $(seq 1 30); do
            if curl -fsSL "${OPENSEARCH_URL}/_cat/health?h=status"; then
              exit 0
            fi
            echo "waiting for OpenSearch... (${i}/30)"
            sleep 5
          done
          echo "OpenSearch did not become available"
          docker logs opensearch
          exit 1
      # searchkick language: 'japanese' が kuromoji を要求するため、
      # 存在しなければここで落として原因を特定しやすくする
      - name: Verify OpenSearch plugins
        run: |
          plugins=$(curl -fsSL "${OPENSEARCH_URL}/_cat/plugins?h=component" | sort)
          echo "${plugins}"
          echo "${plugins}" | grep -q analysis-kuromoji
          echo "${plugins}" | grep -q analysis-icu
      - name: Setup bundler
        run: gem install bundler

      - name: bundle install
        run: |
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node env 🧱
        uses: actions/setup-node@v7
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'
      - name: Install dependencies 👨🏻‍💻
        shell: bash
        run: pnpm install --frozen-lockfile
      - name: pnpm build
        run: bundle exec rails assets:precompile

      - name: Setup Database
        run: |
          cp config/database.yml.github-actions config/database.yml
          bundle exec rake db:create
          bundle exec rake db:migrate
          # bundle exec rake db:schema:load

      - name: Run Brakeman
        run: bundle exec brakeman

      - name: Run RSpec
        run: |
          bundle exec rspec

      - name: Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage # このディレクトリに、テスティングツールによるカバレッジレポートファイルが出力される想定
